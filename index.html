<html lang="en">


<head>
    <link rel="stylesheet" href="Mycss/index.css">
    <link rel="stylesheet" href="Mycss/style.css">
    <meta charset="UTF-8">
    <!--
      页面标题，会显示在浏览器标签页上
      也是搜索引擎结果中显示的主要标题
    -->
    <title>我的博客 | 简约个人网站</title>

<body>
    <!--
      body 部分是页面的可见内容区域
      所有用户能看到的内容都放在这里

      页面头部，通常包含网站 logo 和导航菜单
    -->
    <header class = 'header'>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="anotherHtml/cs2.html">开箱小界面(施工中)</a></li>

            </ul>
        </nav>
    </header>

    <!--
      页面主要内容区域
      每个页面通常只有一个 main 元素
    -->
    <main>
        <div class="hero">
            <h1>欢迎来到我的博客</h1>
            <p>这里记录我的学习笔记、技术分享和生活感悟11111</p>

        <div class="content">
            <article>
                <h2>最新文章</h2>

            </article>
        </div>
    </main>

</body>
</html>
