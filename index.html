<!DOCTYPE html>

<html lang="zh-CN">

<head>
    <!--
      页面标题，会显示在浏览器标签页上
      也是搜索引擎结果中显示的主要标题
    -->
    <title>我的博客 | 简约个人网站</title>

<body>
    <!--
      body 部分是页面的可见内容区域
      所有用户能看到的内容都放在这里
    -->
    
    <!--
      页面头部，通常包含网站 logo 和导航菜单
    -->
    <header>
        <nav>
            <div class="logo">
                <a href="/">我的博客</a>
            </div>
            <ul class="nav-links">
                <li><a href="/">首页</a></li>
                <li><a href="/articles.html">文章</a></li>
                <li><a href="/about.html">关于</a></li>
                <li><a href="/contact.html">联系</a></li>
            </ul>
        </nav>
    </header>

    <!--
      页面主要内容区域
      每个页面通常只有一个 main 元素
    -->
    <main>
        <section class="hero">
            <h1>欢迎来到我的博客</h1>
            <p>这里记录我的学习笔记、技术分享和生活感悟</p>
        </section>
        
        <section class="content">
            <article>
                <h2>最新文章</h2>
                <p>这里可以展示最新的博客文章列表...</p>
            </article>
        </section>
    </main>

</body>
</html>
